version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: seo-postgres
    environment:
      POSTGRES_DB: seo
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seo_user -d seo']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-backup:
    image: postgres:16
    container_name: seo-postgres-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: seo_password
    volumes:
      - postgres_backups:/backups
    command: >
      sh -c "while true; do
      pg_dump -h postgres -U seo_user -d seo > /backups/seo_$$(date +%Y%m%d_%H%M%S).sql;
      find /backups -type f -name '*.sql' -mtime +14 -delete;
      sleep 86400;
      done"

  backend:
    build: .
    container_name: seo-neuroai-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://seo_user:seo_password@postgres:5432/seo
      SECRET_KEY: change-this-secret-key-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: development
      CORS_ORIGINS: '*'
      ALLOWED_HOSTS: '*'
      ENABLE_HTTPS_REDIRECT: 'false'
    ports:
      - '8000:8000'
    volumes:
      - .:/app

  frontend:
    image: node:20
    container_name: seo-neuroai-frontend
    working_dir: /frontend
    command: sh -c 'npm install && npm start'
    ports:
      - '19000:19000'
    volumes:
      - ./frontend:/frontend

volumes:
  postgres_data:
  postgres_backups:
